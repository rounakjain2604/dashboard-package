<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intrinsic — DCF Valuation Engine</title>

<!-- React 18 -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Chart.js 4 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<!-- Google Fonts: DM Serif Display + DM Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════
   INTRINSIC — Premium DCF Valuation Dashboard
   Inspired by ClawProxy analytics aesthetic
   ═══════════════════════════════════════════════════════════ */

:root {
  --bg-body: #f6f3ee;
  --bg-sidebar: #faf8f5;
  --bg-card: #ffffff;
  --bg-card-hover: #fefdfb;
  --bg-input: #ffffff;
  --bg-badge: #f0ede7;
  --border: #e8e3da;
  --border-light: #f0ece4;
  --border-focus: #1a1a1a;
  --text-primary: #1a1a1a;
  --text-secondary: #5c5750;
  --text-muted: #9b9590;
  --text-label: #7a756d;
  --accent-green: #22a06b;
  --accent-green-bg: #e3fcef;
  --accent-green-text: #006644;
  --accent-red: #de350b;
  --accent-red-bg: #ffebe6;
  --accent-red-text: #bf2600;
  --accent-yellow: #ff991f;
  --accent-yellow-bg: #fff7e6;
  --accent-yellow-text: #8b6914;
  --accent-blue: #0065ff;
  --accent-blue-bg: #deebff;
  --accent-cyan: #00b8d9;
  --accent-purple: #6554c0;
  --accent-purple-bg: #eae6ff;
  --accent-pink: #e76e8a;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-modal: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --radius-lg: 16px;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-sans: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  --sidebar-width: 240px;
  --transition: 180ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--font-sans);
  background: var(--bg-body);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── LAYOUT ───────────────────────────────── */
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  min-height: 100vh;
}

/* ── SIDEBAR ──────────────────────────────── */
.sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  z-index: 20;
  overflow: hidden;
}

.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-logo {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
}

.brand-logo svg {
  width: 100%;
  height: 100%;
}

.brand-name {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

.sidebar-nav {
  padding: 16px 12px;
  flex: 1;
  overflow-y: auto;
}

.sidebar-nav-section {
  margin-bottom: 24px;
}

.sidebar-nav-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--text-muted);
  padding: 0 8px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover {
  background: rgba(0,0,0,0.03);
  color: var(--text-primary);
}

.nav-item.active {
  background: rgba(0,0,0,0.05);
  color: var(--text-primary);
  font-weight: 600;
}

.nav-item .nav-icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0.7;
  flex-shrink: 0;
}

.nav-item.active .nav-icon { opacity: 1; }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}

.sidebar-run-btn {
  width: 100%;
  padding: 10px 16px;
  background: var(--text-primary);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all var(--transition);
  letter-spacing: -0.1px;
}

.sidebar-run-btn:hover { background: #333; }
.sidebar-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.sidebar-export-btn {
  width: 100%;
  padding: 8px 16px;
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all var(--transition);
  margin-top: 6px;
}

.sidebar-export-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
.sidebar-export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Settings highlight button in sidebar */
.nav-item.settings-highlight {
  background: var(--text-primary);
  color: #fff;
  font-weight: 600;
  border-radius: var(--radius-sm);
  margin-top: 4px;
}
.nav-item.settings-highlight:hover {
  background: #333;
  color: #fff;
}
.nav-item.settings-highlight .nav-icon { opacity: 1; }

/* Header settings button */
.header-settings-btn {
  padding: 7px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all var(--transition);
}
.header-settings-btn:hover {
  border-color: var(--text-primary);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

/* ── MAIN CONTENT ─────────────────────────── */
.main-content {
  overflow-y: auto;
  height: 100vh;
}

.main-header {
  padding: 28px 32px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.main-header-left h1 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

.main-header-left .subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.main-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.version-badge {
  padding: 5px 14px;
  background: var(--text-primary);
  color: white;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.status-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
}

.status-chip.success { border-color: var(--accent-green); color: var(--accent-green); }
.status-chip.error { border-color: var(--accent-red); color: var(--accent-red); }
.status-chip.loading { border-color: var(--accent-yellow); color: var(--accent-yellow); animation: pulse 1.5s infinite; }

@keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.5 } }

.tab-filter-row {
  padding: 16px 32px 0;
  display: flex;
  align-items: center;
  gap: 4px;
}

.tab-pill {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.tab-pill:hover { border-color: var(--text-muted); color: var(--text-primary); }

.tab-pill.active {
  background: var(--text-primary);
  color: white;
  border-color: var(--text-primary);
}

.main-body {
  padding: 20px 32px 40px;
}

/* ── KPI CARDS (like ClawProxy stats row) ──── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  transition: all var(--transition);
}

.kpi-card:hover {
  box-shadow: var(--shadow-card);
  border-color: #d4cfc6;
}

.kpi-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.kpi-card-title {
  font-size: 13px;
  color: var(--text-label);
  font-weight: 500;
}

.kpi-card-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: var(--bg-badge);
}

.kpi-card-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.5px;
  line-height: 1.1;
  margin-bottom: 8px;
}

.kpi-card-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
}

.kpi-card-badge.positive { background: var(--accent-green-bg); color: var(--accent-green-text); }
.kpi-card-badge.negative { background: var(--accent-red-bg); color: var(--accent-red-text); }
.kpi-card-badge.neutral { background: var(--bg-badge); color: var(--text-muted); }

.kpi-card-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: 6px;
  font-weight: 400;
}

/* ── DISTRIBUTION BAR (like model distribution) ── */
.distribution-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}

.distribution-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.distribution-card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  font-weight: 600;
}

.distribution-card-link {
  font-size: 12px;
  color: var(--accent-green);
  font-weight: 600;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-sans);
}

.distribution-card-link:hover { text-decoration: underline; }

.distribution-bar {
  display: flex;
  height: 36px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 20px;
}

.distribution-bar-segment {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: white;
  white-space: nowrap;
  padding: 0 12px;
  transition: flex var(--transition);
}

.distribution-bar-segment.seg-fcf { background: #78a87c; }
.distribution-bar-segment.seg-tv { background: #8bb4cc; }
.distribution-bar-segment.seg-bridge { background: #d4b876; }
.distribution-bar-segment.seg-equity { background: #c9908d; }

.distribution-legend {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.distribution-legend-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.distribution-legend-item .legend-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}

.distribution-legend-item .legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.distribution-legend-item .legend-stats {
  display: grid;
  grid-template-columns: auto auto auto;
  gap: 4px 12px;
  font-size: 11px;
  padding-left: 14px;
}

.distribution-legend-item .legend-stat-label {
  color: var(--text-muted);
}

.distribution-legend-item .legend-stat-value {
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--text-primary);
}

/* ── CHART CARDS ──────────────────────────── */
.chart-row {
  display: grid;
  gap: 16px;
  margin-bottom: 24px;
}

.chart-row.cols-2 { grid-template-columns: 1fr 1fr; }
.chart-row.cols-1 { grid-template-columns: 1fr; }
.chart-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all var(--transition);
}

.chart-card:hover {
  box-shadow: var(--shadow-card);
}

.chart-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.chart-card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  font-weight: 600;
}

.chart-card-action {
  font-size: 12px;
  color: var(--accent-green);
  font-weight: 600;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-sans);
}

.chart-card-action:hover { text-decoration: underline; }

.chart-container {
  position: relative;
  width: 100%;
  height: 280px;
}

.chart-container.tall { height: 380px; }
.chart-container.short { height: 220px; }

/* ── DATA TABLES (clean, minimal) ───────── */
.table-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}

.table-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-light);
}

.table-card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  font-weight: 600;
}

.table-card-action {
  font-size: 12px;
  color: var(--accent-green);
  font-weight: 600;
  cursor: pointer;
  background: none;
  border: none;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table th {
  text-align: right;
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
  background: var(--bg-card);
  position: sticky;
  top: 0;
}

.data-table th:first-child { text-align: left; padding-left: 20px; }

.data-table td {
  padding: 10px 16px;
  text-align: right;
  border-bottom: 1px solid var(--border-light);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
}

.data-table td:first-child {
  text-align: left;
  font-family: var(--font-sans);
  font-weight: 500;
  color: var(--text-primary);
  padding-left: 20px;
}

.data-table tr:last-child td { border-bottom: none; }

.data-table tr:hover td { background: rgba(0,0,0,0.01); }

.data-table .row-total td {
  font-weight: 700;
  color: var(--text-primary);
  border-top: 2px solid var(--border);
  background: rgba(0,0,0,0.015);
}

.data-table .row-subtotal td {
  font-weight: 600;
  color: var(--text-secondary);
}

/* ── HEATMAP ──────────────────────────────── */
.heatmap-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: var(--font-mono);
}

.heatmap-table th {
  background: var(--bg-badge);
  color: var(--text-label);
  font-weight: 600;
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
  font-size: 11px;
}

.heatmap-table td {
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
  font-weight: 500;
  transition: all var(--transition);
}

.heatmap-table td:first-child {
  background: var(--bg-badge);
  color: var(--text-label);
  font-weight: 600;
}

/* ── WACC Component Grid ──────────────────── */
.wacc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.wacc-item {
  background: var(--bg-body);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
}

.wacc-item-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 600;
}

.wacc-item-value {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--text-primary);
}

/* ── SETTINGS MODAL ───────────────────────── */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  display: flex;
  justify-content: flex-end;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.settings-panel {
  width: 480px;
  max-width: 90vw;
  background: var(--bg-card);
  height: 100vh;
  overflow-y: auto;
  box-shadow: var(--shadow-modal);
  animation: slideIn 0.25s ease;
  padding: 0;
}

@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.settings-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg-card);
  z-index: 2;
}

.settings-header h2 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
}

.settings-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.settings-close:hover { background: var(--bg-body); border-color: var(--text-muted); }

.settings-body {
  padding: 16px 24px 40px;
}

.settings-section {
  margin-bottom: 24px;
}

.settings-section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  user-select: none;
}

.settings-section-icon {
  font-size: 14px;
  opacity: 0.7;
}

.settings-section-label {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
  color: var(--text-primary);
}

.settings-section-toggle {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.settings-section-toggle.open { transform: rotate(180deg); }

.settings-section-body {
  display: grid;
  gap: 8px;
}

.settings-section-body.collapsed { display: none; }

.input-row {
  display: grid;
  grid-template-columns: 1fr 120px;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
}

.input-row.wide { grid-template-columns: 1fr; }

.input-label {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

.input-label .unit {
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 400;
}

input[type="number"],
input[type="text"],
select {
  background: var(--bg-body);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 10px;
  border-radius: var(--radius-xs);
  outline: none;
  transition: all var(--transition);
  width: 100%;
}

input:focus, select:focus {
  border-color: var(--text-primary);
  box-shadow: 0 0 0 3px rgba(26,26,26,0.05);
}

input[type="number"]::-webkit-inner-spin-button { opacity: 0.3; }

/* ── EMPTY STATE ──────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 500px;
  text-align: center;
  padding: 60px 20px;
}

.empty-logo {
  width: 80px;
  height: 80px;
  margin-bottom: 28px;
  opacity: 0.25;
}

.empty-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 8px;
}

.empty-desc {
  color: var(--text-muted);
  max-width: 380px;
  line-height: 1.7;
  font-size: 14px;
}

/* ── SPINNER ──────────────────────────────── */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.spinner.dark {
  border-color: rgba(0,0,0,0.1);
  border-top-color: var(--text-primary);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── SCENARIO BADGES ──────────────────────── */
.scenario-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.scenario-badge.base { background: var(--accent-blue-bg); color: var(--accent-blue); }
.scenario-badge.bull { background: var(--accent-green-bg); color: var(--accent-green-text); }
.scenario-badge.bear { background: var(--accent-red-bg); color: var(--accent-red-text); }

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 1100px) {
  .chart-row.cols-2 { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar { position: fixed; left: -260px; transition: left 0.3s; z-index: 50; }
  .sidebar.open { left: 0; }
  .main-header, .tab-filter-row, .main-body { padding-left: 16px; padding-right: 16px; }
}

/* ── FOOTBALL FIELD ───────────────────────── */
.ff-row {
  display: grid;
  grid-template-columns: 130px 1fr 90px;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.ff-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

.ff-bar-track {
  height: 24px;
  background: var(--bg-body);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.ff-bar {
  height: 100%;
  border-radius: 4px;
  position: absolute;
  transition: all 0.5s;
}

.ff-value {
  font-size: 12px;
  font-family: var(--font-mono);
  font-weight: 500;
  text-align: right;
  color: var(--text-secondary);
}

/* Error banner */
.error-banner {
  background: var(--accent-red-bg);
  color: var(--accent-red);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
</style>

{% raw %}
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════
//   FORMATTING HELPERS
// ═══════════════════════════════════════════════════
const fmt = {
  usd: (v) => {
    if (v == null || isNaN(v)) return '—';
    const abs = Math.abs(v);
    if (abs >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
    if (abs >= 1e6) return `$${(v/1e6).toFixed(2)}M`;
    if (abs >= 1e3) return `$${(v/1e3).toFixed(1)}K`;
    return `$${v.toFixed(2)}`;
  },
  num: (v, d=0) => v == null || isNaN(v) ? '—' : v.toLocaleString('en-US', {minimumFractionDigits: d, maximumFractionDigits: d}),
  pct: (v, d=1) => v == null || isNaN(v) ? '—' : `${(v*100).toFixed(d)}%`,
  x: (v) => v == null || isNaN(v) ? '—' : `${v.toFixed(1)}x`,
};

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
//   CHART COMPONENT
// ═══════════════════════════════════════════════════
function ChartComponent({ type, data, options, className = '' }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !data) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type,
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#7a756d', font: { family: 'DM Sans', size: 11, weight: 500 }, padding: 16, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: {
            backgroundColor: '#fff',
            titleColor: '#1a1a1a',
            bodyColor: '#5c5750',
            borderColor: '#e8e3da',
            borderWidth: 1,
            cornerRadius: 8,
            padding: 12,
            titleFont: { family: 'DM Sans', weight: 600, size: 12 },
            bodyFont: { family: 'JetBrains Mono', size: 11 },
            displayColors: true,
            boxPadding: 4,
          },
        },
        scales: {
          x: {
            ticks: { color: '#9b9590', font: { family: 'DM Sans', size: 11 } },
            grid: { color: 'rgba(232,227,218,0.6)', drawBorder: false },
            border: { display: false },
          },
          y: {
            ticks: { color: '#9b9590', font: { family: 'JetBrains Mono', size: 10 } },
            grid: { color: 'rgba(232,227,218,0.6)', drawBorder: false },
            border: { display: false },
          },
        },
        ...options,
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [type, data, options]);

  return <canvas ref={canvasRef} className={className} />;
}

// ═══════════════════════════════════════════════════
//   INPUT FIELD
// ═══════════════════════════════════════════════════
function InputField({ label, unit, value, onChange, type = 'number', step, min, max, pct, options: selectOptions }) {
  const displayValue = pct ? +(value * 100).toFixed(4) : value;
  const handleChange = (e) => {
    const raw = parseFloat(e.target.value) || 0;
    onChange(pct ? raw / 100 : raw);
  };
  if (selectOptions) {
    return (
      <div className="input-row">
        <label className="input-label">{label} {unit && <span className="unit">({unit})</span>}</label>
        <select value={value} onChange={e => onChange(e.target.value)}>
          {selectOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
    );
  }
  return (
    <div className="input-row">
      <label className="input-label">{label} {unit && <span className="unit">({unit})</span>}</label>
      <input type={type} value={type === 'number' ? displayValue : value} step={step || 'any'} min={min} max={max}
        onChange={type === 'number' ? handleChange : e => onChange(e.target.value)} />
    </div>
  );
}

// ═══════════════════════════════════════════════════
//   SETTINGS SECTION (collapsible)
// ═══════════════════════════════════════════════════

}

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
//   DATA TABLE 
// ═══════════════════════════════════════════════════
function DataTable({ data, columns, formatters = {}, totalRows = [], subtotalRows = [] }) {
  if (!data || data.length === 0) return <div style={{ color: 'var(--text-muted)', padding: 24, textAlign: 'center', fontSize: 13 }}>No data available</div>;
  const cols = columns || Object.keys(data[0]);
  return (
    <div style={{ overflowX: 'auto' }}>
      <table className="data-table">
        <thead>
          <tr>{cols.map(c => <th key={c}>{c}</th>)}</tr>
        </thead>
        <tbody>
          {data.map((row, i) => {
            const firstCol = String(row[cols[0]] || '');
            const isTotal = totalRows.some(t => firstCol.includes(t));
            const isSub = subtotalRows.some(t => firstCol.includes(t));
            return (
              <tr key={i} className={isTotal ? 'row-total' : isSub ? 'row-subtotal' : ''}>
                {cols.map(c => {
                  const v = row[c];
                  const formatter = formatters[c];
                  return <td key={c}>{formatter ? formatter(v) : (typeof v === 'number' ? fmt.num(v, v % 1 !== 0 ? 2 : 0) : String(v ?? ''))}</td>;
                })}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ═══════════════════════════════════════════════════
//   HEATMAP TABLE
// ═══════════════════════════════════════════════════
function HeatmapTable({ data, title }) {
  if (!data || data.length === 0) return null;
  const cols = Object.keys(data[0]);
  const rowLabel = cols.find(c => c.includes('\u2193')) || cols.find(c => c.includes('\u2190') || c.includes('\u2192')) || cols[0];
  const valueCols = cols.filter(c => c !== rowLabel);

  const allVals = data.flatMap(r => valueCols.map(c => r[c])).filter(v => v != null && !isNaN(v));
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const range = maxV - minV || 1;

  const getColor = (v) => {
    if (v == null || isNaN(v)) return 'transparent';
    const ratio = (v - minV) / range;
    if (ratio > 0.6) return `rgba(34, 160, 107, ${0.1 + ratio * 0.25})`;
    if (ratio > 0.4) return `rgba(0, 101, 255, ${0.06 + ratio * 0.12})`;
    return `rgba(222, 53, 11, ${0.1 + (1 - ratio) * 0.25})`;
  };

  return (
    <div>
      {title && <div className="chart-card-header"><span className="chart-card-title">{title}</span></div>}
      <div style={{ overflowX: 'auto' }}>
        <table className="heatmap-table">
          <thead><tr><th>{rowLabel}</th>{valueCols.map(c => <th key={c}>{c}</th>)}</tr></thead>
          <tbody>
            {data.map((row, i) => (
              <tr key={i}>
                <td>{typeof row[rowLabel] === 'number' ? fmt.pct(row[rowLabel]) : row[rowLabel]}</td>
                {valueCols.map(c => (
                  <td key={c} style={{ background: getColor(row[c]) }}>
                    {fmt.usd(row[c])}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}


// ════════════════════════════════════════════════════
// ██   MAIN APP COMPONENT
// ════════════════════════════════════════════════════
function App() {
  const [config, setConfig] = useState(JSON.parse(JSON.stringify(DEFAULT_CONFIG)));
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [exporting, setExporting] = useState(false);
  const [activeTab, setActiveTab] = useState('overview');
  const [error, setError] = useState(null);
  const [appVersion, setAppVersion] = useState('V14');
  const [showSettings, setShowSettings] = useState(false);

  // Deep updater
  const updateConfig = useCallback((path, value) => {
    setConfig(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split('.');
      let obj = next;
      for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
      obj[keys[keys.length - 1]] = value;
      return next;
    });
  }, []);

  // Auto-sync MC distribution means
  useEffect(() => {
    setConfig(prev => {
      const fc = prev.forecast || {};
      const wc = prev.wacc || {};
      const vc = prev.valuation || {};
      const mc = prev.monte_carlo || {};

      const newRevMean = fc.revenue_cagr ?? 0.08;
      const newMargin = 1.0 - (fc.cogs_pct_revenue ?? 0.33) - (fc.sga_pct_revenue ?? 0.20) - (fc.other_opex_pct_revenue ?? 0.05);
      const newTG = vc.terminal_growth_rate ?? 0.025;
      const newExitMult = vc.exit_ev_ebitda_multiple ?? 10.0;

      const rf = wc.risk_free_rate ?? 0.042;
      const erp = wc.equity_risk_premium ?? 0.055;
      const beta = wc.beta ?? 1.1;
      const sp = wc.size_premium ?? 0;
      const crp = wc.country_risk_premium ?? 0;
      const ke = rf + beta * erp + sp + crp;
      const icr = wc.interest_coverage_ratio ?? 5.0;
      let spread = 0.02;
      if (icr > 8.5) spread = 0.01;
      else if (icr > 6.5) spread = 0.012;
      else if (icr > 5.5) spread = 0.015;
      else if (icr > 4.25) spread = 0.02;
      else if (icr > 3.0) spread = 0.025;
      else if (icr > 2.5) spread = 0.035;
      else if (icr > 2.0) spread = 0.045;
      else if (icr > 1.5) spread = 0.06;
      else spread = 0.08;
      const kdPre = rf + spread;
      const tax = wc.tax_rate ?? fc.tax_rate ?? 0.25;
      const kdPost = kdPre * (1 - tax);
      const ew = wc.target_equity_weight ?? 0.70;
      const dw = wc.target_debt_weight ?? 0.30;
      const newWACC = ke * ew + kdPost * dw;

      if (Math.abs((mc.revenue_growth_mean ?? 0) - newRevMean) < 1e-8 &&
          Math.abs((mc.ebitda_margin_mean ?? 0) - newMargin) < 1e-8 &&
          Math.abs((mc.wacc_mean ?? 0) - newWACC) < 1e-8 &&
          Math.abs((mc.terminal_growth_mean ?? 0) - newTG) < 1e-8 &&
          Math.abs((mc.exit_multiple_mean ?? 0) - newExitMult) < 1e-8) {
        return prev;
      }

      const next = JSON.parse(JSON.stringify(prev));
      next.monte_carlo.revenue_growth_mean = newRevMean;
      next.monte_carlo.ebitda_margin_mean = +newMargin.toFixed(6);
      next.monte_carlo.wacc_mean = +newWACC.toFixed(6);
      next.monte_carlo.terminal_growth_mean = newTG;
      next.monte_carlo.exit_multiple_mean = newExitMult;
      return next;
    });
  }, [
    config.forecast.revenue_cagr, config.forecast.cogs_pct_revenue,
    config.forecast.sga_pct_revenue, config.forecast.other_opex_pct_revenue,
    config.wacc.risk_free_rate, config.wacc.equity_risk_premium,
    config.wacc.beta, config.wacc.size_premium, config.wacc.country_risk_premium,
    config.wacc.target_debt_weight, config.wacc.target_equity_weight,
    config.wacc.tax_rate, config.wacc.interest_coverage_ratio,
    config.forecast.tax_rate, config.valuation.terminal_growth_rate,
    config.valuation.exit_ev_ebitda_multiple,
  ]);

  useEffect(() => {
    fetch('/api/version').then(r => r.json()).then(v => { if (v && v.badge) setAppVersion(v.badge); }).catch(() => {});
  }, []);

  // Run model
  const isFirstRun = useRef(true);
  const runModel = useCallback(async (autoRun = false) => {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      });
      const data = await res.json();
      if (data.success) {
        setResults(data);
        if (!autoRun) setActiveTab('overview');
      } else {
        setError(data.error || 'Pipeline failed');
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  }, [config]);

  // Auto-run debounced
  useEffect(() => {
    const timer = setTimeout(() => {
      runModel(isFirstRun.current ? false : true);
      isFirstRun.current = false;
    }, isFirstRun.current ? 100 : 800);
    return () => clearTimeout(timer);
  }, [runModel]);

  // Export
  const exportExcel = useCallback(async () => {
    setExporting(true);
    setError(null);

      const res = await fetch('/api/export-excel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || 'Export failed');
      }
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(config.company_name || 'DCF_Model').replace(/\s+/g, '_')}_IB_Grade_Model.xlsx`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
    } catch (e) { setError(e.message); }
    setExporting(false);

        <div className="kpi-row">
          <KpiCard title="Mean" value={fmt.usd(stats['Mean'] || stats['mean'])} icon="◎" />
          <KpiCard title="Median" value={fmt.usd(stats['Median'] || stats['median'])} icon="◆" />
          <KpiCard title="P10" value={fmt.usd(stats['P10'] || stats['p10'])} icon="⇶" badge="downside" badgeType="negative" />
          <KpiCard title="P90" value={fmt.usd(stats['P90'] || stats['p90'])} icon="⊕" badge="upside" badgeType="positive" />
        </div>

        <div className="chart-card" style={{ marginBottom: 24 }}>
          <div className="chart-card-header">
            <span className="chart-card-title">Distribution · {(config.monte_carlo.iterations || 10000).toLocaleString()} Simulations</span>
          </div>
          <div className="chart-container tall">
            {hist.centers && hist.counts ? (
              <ChartComponent key={`mc-${JSON.stringify(stats).slice(0,60)}`} type="bar" data={{
                labels: hist.centers.map(c => fmt.usd(c)),
                datasets: [{
                  label: 'Frequency',
                  data: hist.counts,
                  backgroundColor: hist.centers.map(c => {
                    const mean = stats['Mean'] || stats['mean'] || 0;
                    if (c < mean * 0.85) return 'rgba(201,144,141,0.7)';
                    if (c > mean * 1.15) return 'rgba(120,168,124,0.7)';
                    return 'rgba(139,180,204,0.7)';
                  }),
                  borderRadius: 2,
                }],
              }} options={{
                plugins: { legend: { display: false } },
                scales: {
                  x: { ticks: { maxTicksLimit: 15, maxRotation: 45 } },
                  y: { title: { display: true, text: 'Frequency', color: '#9b9590', font: { family: 'DM Sans', size: 11 } } },
                },
              }} />
            ) : <div style={{color:'var(--text-muted)',textAlign:'center',padding:40}}>No histogram data</div>}
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-card-header"><span className="chart-card-title">Distribution Statistics</span></div>
          <div className="wacc-grid">
            {Object.entries(stats).map(([k, v]) => (
              <div key={k} className="wacc-item">
                <div className="wacc-item-label">{k}</div>
                <div className="wacc-item-value" style={{ fontSize: 16 }}>
                  {typeof v === 'number' ? (Math.abs(v) > 100 ? fmt.usd(v) : v.toFixed(4)) : String(v)}
                </div>
              </div>
            ))}
          </div>
        </div>
      </>
    );
  };

  // ── TORNADO ──
  const renderTornado = () => {
    const t = results.tornado;
    if (!t || !t.length) return <div style={{color:'var(--text-muted)',padding:40}}>Tornado not computed</div>;

    return (
      <>
        <div className="chart-card" style={{ marginBottom: 24 }}>
          <div className="chart-card-header"><span className="chart-card-title">Tornado Sensitivity (±20% Swing)</span></div>
          <div className="chart-container tall">
            <ChartComponent type="bar" data={{
              labels: t.map(r => r['Driver'] || r['driver'] || Object.values(r)[0]),
              datasets: [
                { label: 'Low Case', data: t.map(r => r['Equity at Low'] || r['Low Value'] || r['low_value'] || 0), backgroundColor: '#c9908d', borderRadius: 6 },
                { label: 'High Case', data: t.map(r => r['Equity at High'] || r['High Value'] || r['high_value'] || 0), backgroundColor: '#78a87c', borderRadius: 6 },
              ],
            }} options={{
              indexAxis: 'y',
              plugins: { legend: { position: 'top' } },
              scales: {
                x: { ticks: { callback: v => fmt.usd(v) } },
                y: { ticks: { font: { size: 11, family: 'DM Sans' } } },
              },
            }} />
          </div>
        </div>

        <div className="table-card">
          <div className="table-card-header"><span className="table-card-title">Tornado Drivers</span></div>
          <DataTable data={t.map(r => ({
            Driver: r['Driver'],
            'Base Input': typeof r['Base Input'] === 'number' ? (Math.abs(r['Base Input']) < 1 ? fmt.pct(r['Base Input']) : fmt.num(r['Base Input'], 2)) : r['Base Input'],
            'Low Case': fmt.usd(r['Equity at Low']),
            'High Case': fmt.usd(r['Equity at High']),
            'Impact': fmt.usd(r['Impact']),
          }))} columns={['Driver', 'Base Input', 'Low Case', 'High Case', 'Impact']} />
        </div>
      </>
    );
  };

  // ── CONTENT ROUTER ──
  const renderContent = () => {
    if (!results) {
      return (
        <div className="empty-state">
          <div className="empty-logo"><IntrinsicLogo size={80} color="#c4bfb6" /></div>
          <div className="empty-title">Intrinsic</div>
          <div className="empty-desc">
            Configure your model assumptions, then click <strong>Run Model</strong> to generate a full 3-statement model with DCF valuation, Monte Carlo simulation, and sensitivity analysis.
          </div>
        </div>
      );
    }

    switch (activeTab) {
      case 'overview': return renderOverview();
      case 'income': return renderIncomeStatement();
      case 'balance': return renderBalanceSheet();
      case 'cashflow': return renderCashFlow();
      case 'wacc_tab': return renderWACC();
      case 'dcf': return renderDCF();
      case 'scenarios': return renderScenarios();
      case 'sensitivity': return renderSensitivity();
      case 'montecarlo': return renderMonteCarlo();
      case 'tornado': return renderTornado();
      default: return null;
    }
  };

  // ── MAIN RENDER ──
  const tabTitle = NAV_MAIN.find(n => n.id === activeTab)?.label || 'Overview';

  return (
    <div className="app-layout">
      {renderSidebar()}
      {renderSettingsPanel()}

      <main className="main-content">
        <div className="main-header">
          <div className="main-header-left">
            <h1>{tabTitle}</h1>
            <div className="subtitle">{config.company_name} · {config.currency}</div>
          </div>
          <div className="main-header-right">
            <button className="header-settings-btn" onClick={() => setShowSettings(true)}>⚙ Assumptions</button>
            <span className="version-badge">{appVersion}</span>
            {results && (
              <span className="status-chip success">
                ✓ {Object.values(results.timings || {}).reduce((a,b) => a+b, 0).toFixed(2)}s
              </span>
            )}
            {loading && <span className="status-chip loading"><span className="spinner dark" style={{width:10,height:10,borderWidth:1.5}}></span> Running</span>}
            {error && <span className="status-chip error">✗ Error</span>}
          </div>
        </div>

        {/* Sub-tabs for quick navigation (like ClawProxy time filters) */}
        {results && (
          <div className="tab-filter-row">
            {NAV_MAIN.slice(0, 6).map(t => (
              <button key={t.id} className={`tab-pill ${activeTab === t.id ? 'active' : ''}`}
                onClick={() => setActiveTab(t.id)}>{t.label}</button>
            ))}
            <button className={`tab-pill ${['scenarios','sensitivity','montecarlo','tornado'].includes(activeTab) ? 'active' : ''}`}
              style={{ position: 'relative' }}
              onClick={() => {
                const analyticsTabs = ['scenarios','sensitivity','montecarlo','tornado'];
                const idx = analyticsTabs.indexOf(activeTab);
                setActiveTab(analyticsTabs[(idx + 1) % analyticsTabs.length]);
              }}>
              Analytics ↻
            </button>
          </div>
        )}

        <div className="main-body">
          {error && <div className="error-banner">⚠ {error}</div>}
          {renderContent()}
        </div>
      </main>
    </div>
  );
}

// ── Mount ──
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
{% endraw %}
</body>
</html>
