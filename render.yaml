services:
  - type: web
    name: trinsic
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard_api:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: BRAND_NAME
        value: Trinsic
      - key: SUPPORT_EMAIL
        value: support@trinsic.space
      - key: MAX_MONTE_CARLO_ITERATIONS
        value: "2000"
      - key: WACC_LIVE_DATA_ENABLED
        value: "false"
      - key: CUSTOM_MODEL_CHECKOUT_URL
        sync: false
      - key: BUNDLE_CHECKOUT_URL
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
